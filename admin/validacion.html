<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060605">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<title>Validación de Reportes - COGUSA SGI</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="../css/tema-dorado.css">
<style> #mod-mapa-gps { height: 220px; border-radius: 10px; margin: 10px 0; } </style>
</head>
<body>
<div id="app">
  <header class="barra-superior">
    <div class="marca">
      <img src="../assets/logo-empresa.png" alt="Empresas Galindo" class="marca-icono">
      <div class="marca-texto">
        <h1>Validación de reportes</h1>
        <div class="subt" id="nombre-admin"></div>
      </div>
    </div>
    <nav>
      <a href="dashboard.html" data-modulo="dashboard">Dashboard</a>
      <a href="../inspector.html">Nuevo reporte</a>
      <a href="../reportes.html">Reportes</a>
      <a href="validacion.html" class="activo" data-modulo="validacion">Validación</a>
      <a href="catalogos.html" data-modulo="configuraciones">Configuraciones</a>
      <a href="informes.html" data-modulo="informes">Informes</a>
      <button class="btn-salir" onclick="cerrarSesionYSalir()">
        <svg class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Salir
      </button>
    </nav>
  </header>

  <main class="contenedor">
    <div class="tarjeta">
      <div class="tabs">
        <button class="tab" id="tab-pendientes">Pendientes</button>
        <button class="tab" id="tab-validados">Validados</button>
      </div>
      <div id="lista-vacia" class="aviso aviso-info" style="display:none;">No hay reportes en esta bandeja.</div>
      <div class="rejilla-reportes" id="rejilla-reportes"></div>
    </div>
  </main>
</div>

<!-- Modal de detalle / validación -->
<div class="modal-fondo" id="modal-fondo" style="display:none;">
  <div class="modal-caja">
    <div class="modal-encabezado">
      <h2>Detalle del reporte</h2>
      <button class="cerrar-modal" id="cerrar-modal" aria-label="Cerrar">
        <svg class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-cuerpo" id="modal-contenido"></div>
    <div class="modal-pie" id="modal-pie"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/config.js"></script>
<script src="../js/firebase-init.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/reportes.js"></script>
<script>
let perfilAdmin = null;
let usuarioAdmin = null;
let estadoActual = "pendiente";
let reportesCache = [];
let mapaModalGPS = null;
let gpsCorregidoMod = null;

protegerPagina("validacion", (user, perfil, permisos) => {
  usuarioAdmin = user;
  perfilAdmin = perfil;
  aplicarVisibilidadNav(perfil, permisos);
  inicializarCampana(perfil, user.uid);
  document.getElementById("nombre-admin").textContent = perfil.nombre || perfil.correo;
  // Borrar reportes es siempre exclusivo del admin, aunque el inspector
  // tenga permiso de validación (corregir no es lo mismo que borrar).
  if (perfil.rol !== "admin") {
    document.getElementById("btn-eliminar-reporte").style.display = "none";
  }
  cargarReportes();
});

document.getElementById("tab-pendientes").addEventListener("click", () => { estadoActual = "pendiente"; cargarReportes(); });
document.getElementById("tab-validados").addEventListener("click", () => { estadoActual = "validado"; cargarReportes(); });

function cargarReportes() {
  document.getElementById("tab-pendientes").classList.toggle("activo", estadoActual === "pendiente");
  document.getElementById("tab-validados").classList.toggle("activo", estadoActual === "validado");

  colReportes.where("estado", "==", estadoActual).orderBy("creadoEn", "desc").onSnapshot((snap) => {
    reportesCache = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    renderizarRejilla();
  }, (err) => {
    console.error(err);
    document.getElementById("rejilla-reportes").innerHTML = "";
    document.getElementById("lista-vacia").style.display = "block";
    document.getElementById("lista-vacia").textContent = "Error cargando reportes. Verifique su conexión.";
  });
}

function renderizarRejilla() {
  const rejilla = document.getElementById("rejilla-reportes");
  const vacio = document.getElementById("lista-vacia");
  rejilla.innerHTML = "";
  vacio.style.display = reportesCache.length ? "none" : "block";
  vacio.textContent = "No hay reportes en esta bandeja.";

  const iconoUsuario = `<svg class="icono icono-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  const iconoReloj = `<svg class="icono icono-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;

  reportesCache.forEach((r) => {
    const div = document.createElement("div");
    div.className = "tarjeta tarjeta-reporte";
    div.innerHTML = `
      <div class="foto-portada">
        ${r.fotos && r.fotos[0] ? `<img src="${r.fotos[0]}">` : ""}
        ${r.gravedad ? `<span class="etiqueta-gravedad ${claseGravedad(r.gravedad)}">${r.gravedad}</span>` : ""}
      </div>
      <div class="cuerpo">
        <h3>${r.zona} — ${r.proceso}</h3>
        <p>${(r.descripcion || "").slice(0, 90)}${r.descripcion && r.descripcion.length > 90 ? "..." : ""}</p>
        <div class="meta">
          <p>${iconoUsuario} ${r.inspectorNombre}</p>
        </div>
        <div class="meta">
          <p>${iconoReloj} ${formatearFechaHora(r.fechaHora)}${r.turno ? " · " + r.turno : ""}</p>
        </div>
      </div>
    `;
    div.addEventListener("click", () => abrirModal(r));
    rejilla.appendChild(div);
  });
}

function abrirModal(reporte) {
  const modal = document.getElementById("modal-fondo");
  const contenido = document.getElementById("modal-contenido");

  // El modal debe quedar visible ANTES de crear el mapa Leaflet: si el mapa
  // se inicializa dentro de un contenedor con display:none, mide 0x0 y
  // renderiza en blanco/incompleto (se veía sobre todo en tablets).
  modal.style.display = "flex";

  contenido.innerHTML = `
    <div class="fotos-grid" style="margin-bottom:14px;">
      ${reporte.fotos.map((f) => `<div class="foto-miniatura"><img src="${f}"></div>`).join("")}
    </div>
    <div class="detalle-meta">
      <div class="detalle-meta-item"><span class="detalle-meta-etq">Inspector</span><span class="detalle-meta-val">${reporte.inspectorNombre}</span></div>
      <div class="detalle-meta-item"><span class="detalle-meta-etq">Fecha</span><span class="detalle-meta-val">${formatearFechaHora(reporte.fechaHora)}</span></div>
      <div class="detalle-meta-item"><span class="detalle-meta-etq">GPS del inspector</span><span class="detalle-meta-val">${reporte.gps ? reporte.gps.lat.toFixed(5) + ", " + reporte.gps.lng.toFixed(5) : "No disponible (" + (reporte.gpsError || "sin dato") + ")"}</span></div>
    </div>

    <h3 class="titulo-seccion-modal">Datos a validar</h3>
    <div class="campo">
      <label>Descripción del hallazgo</label>
      <textarea id="mod-descripcion" rows="4" placeholder="Describa el hallazgo...">${(reporte.descripcion || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")}</textarea>
    </div>
    <label>Punto del hallazgo en el plano</label>
    <div class="contenedor-plano" id="mod-contenedor-plano" style="margin-bottom:14px;"></div>
    <label>Ubicación GPS (arrastre el marcador para corregirla; el pin del plano se recalcula solo)</label>
    <div id="mod-mapa-gps"></div>
    <div class="campo" style="margin-top:16px;">
      <label>Turno</label>
      <select id="mod-turno">
        <option value="">Sin especificar</option>
        ${NIVELES_TURNO_REPORTE.map((t) => `<option value="${t}" ${reporte.turno === t ? "selected" : ""}>${t}</option>`).join("")}
      </select>
    </div>
    <div class="campo autocompletar">
      <label>Zona</label>
      <input type="text" id="mod-zona" value="${reporte.zona}" autocomplete="off">
      <div class="lista-sugerencias" id="mod-lista-zona" style="display:none;"></div>
    </div>
    <div class="campo">
      <label>Proceso</label>
      <select id="mod-proceso"></select>
    </div>
    <div class="campo">
      <label>Categoría</label>
      <select id="mod-categoria"></select>
      ${!reporte.categoria && reporte.puntoNormaTexto ? `<p class="ayuda">Punto de norma (histórico, ya no editable): ${reporte.puntoNormaTexto}${reporte.noAplicaNorma ? " — No aplica" : ""}</p>` : ""}
    </div>
    <div class="campo">
      <label>Gravedad *</label>
      <select id="mod-gravedad">
        <option value="">-- Seleccione --</option>
        ${NIVELES_GRAVEDAD.map((g) => `<option value="${g}" ${reporte.gravedad === g ? "selected" : ""}>${g}</option>`).join("")}
      </select>
    </div>
    <div class="campo">
      <label>Observaciones para el inspector (opcional)</label>
      <textarea id="mod-observaciones-inspector" placeholder="Ej: se corrigió la zona porque no correspondía a esa área. Este mensaje se le mostrará al inspector como retroalimentación."></textarea>
    </div>
    ${reporte.estado === "validado" ? `<p class="aviso aviso-exito">Validado por ${reporte.validadoPorNombre} el ${formatearFechaHora(reporte.fechaValidacion)}</p>` : ""}

    <div id="zona-eliminar" style="margin-top:18px; padding-top:14px; border-top:1px solid var(--color-borde);">
      <button class="btn btn-peligro btn-pequeno" id="btn-eliminar-reporte">
        <svg class="icono icono-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Eliminar este reporte
      </button>
      <div id="confirmar-eliminar" style="display:none; margin-top:10px;">
        <p class="aviso aviso-error">Esta acción es permanente y no se puede deshacer (se perderán también las fotos asociadas del registro). ¿Confirma que desea eliminar este reporte?</p>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-peligro" id="btn-confirmar-eliminar">Sí, eliminar definitivamente</button>
          <button class="btn btn-secundario" id="btn-cancelar-eliminar">Cancelar</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("modal-pie").innerHTML = `
    <button class="btn btn-exito" id="btn-guardar-validacion">Guardar validación</button>
  `;

  // --- Mapa GPS con marcador arrastrable para corregir la ubicación -------
  if (mapaModalGPS) { mapaModalGPS.remove(); mapaModalGPS = null; }
  const gpsInicial = reporte.gps || UBICACION_PLANTA_POR_DEFECTO;
  gpsCorregidoMod = { lat: gpsInicial.lat, lng: gpsInicial.lng };
  mapaModalGPS = L.map("mod-mapa-gps").setView([gpsInicial.lat, gpsInicial.lng], 17);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors", maxZoom: 19
  }).addTo(mapaModalGPS);
  const marcadorMod = L.marker([gpsInicial.lat, gpsInicial.lng], { draggable: true }).addTo(mapaModalGPS);
  setTimeout(() => mapaModalGPS && mapaModalGPS.invalidateSize(), 100);

  // Plano con el punto del hallazgo. Si el admin arrastra el marcador GPS,
  // el pin del plano se recalcula con la misma calibración que usa el
  // inspector, para que ambos queden siempre consistentes al guardar.
  let planoPuntoMod = reporte.planoPunto || null;
  let marcoPlanoMod = null;
  let esquinasPlanoMod = null;
  Promise.all([
    cargarPlanoImagenReal(document.getElementById("mod-contenedor-plano")),
    obtenerEsquinasPlanoGPS()
  ]).then(([marco, esquinas]) => {
    marcoPlanoMod = marco;
    esquinasPlanoMod = esquinas;
    // Reportes antiguos guardaban el punto en coordenadas 0-1000 del plano
    // esquemático anterior; se descartan para recalcular desde el GPS.
    if (planoPuntoMod && (planoPuntoMod.x > 100 || planoPuntoMod.y > 100)) planoPuntoMod = null;
    if (!planoPuntoMod && esquinas && reporte.gps) {
      planoPuntoMod = gpsAPuntoPlano(reporte.gps, esquinas);
    }
    if (planoPuntoMod) marcarPinEnPlano(marco, planoPuntoMod);
  });

  marcadorMod.on("dragend", () => {
    const pos = marcadorMod.getLatLng();
    gpsCorregidoMod = { lat: pos.lat, lng: pos.lng };
    if (marcoPlanoMod && esquinasPlanoMod) {
      const punto = gpsAPuntoPlano(gpsCorregidoMod, esquinasPlanoMod);
      if (punto) {
        planoPuntoMod = punto;
        marcarPinEnPlano(marcoPlanoMod, punto);
      }
    }
  });

  crearAutocompletarConCreacion({
    inputEl: document.getElementById("mod-zona"),
    listaEl: document.getElementById("mod-lista-zona"),
    coleccion: colZonas,
    uidUsuario: usuarioAdmin.uid,
    onSeleccion: () => {}
  });
  poblarSelectProcesos(document.getElementById("mod-proceso"), reporte.proceso);
  poblarSelectCategorias(document.getElementById("mod-categoria"), reporte.categoria);

  document.getElementById("btn-guardar-validacion").addEventListener("click", async () => {
    const gravedad = document.getElementById("mod-gravedad").value;
    if (!gravedad) { mostrarAvisoGlobal("Debe seleccionar la gravedad del hallazgo.", "advertencia"); return; }

    const nuevos = {
      turno: document.getElementById("mod-turno").value || null,
      zona: document.getElementById("mod-zona").value.trim(),
      proceso: document.getElementById("mod-proceso").value.trim(),
      categoria: document.getElementById("mod-categoria").value.trim() || null,
      descripcion: document.getElementById("mod-descripcion").value.trim(),
      gps: gpsCorregidoMod,
      gravedad
    };
    const mensajeInspector = document.getElementById("mod-observaciones-inspector").value.trim();

    // Retroalimentación para el inspector: comparación campo por campo entre
    // lo que registró originalmente y cómo quedó, más el mensaje opcional.
    // Si no hay nada que avisar (una revalidación sin cambios y sin mensaje
    // nuevo), no se le notifica de nuevo.
    const comparacion = construirComparacionCambios(reporte, nuevos);
    const hayNotificacion = comparacion.hayDiferencias || !!mensajeInspector;

    const cambios = {
      ...nuevos,
      planoPunto: planoPuntoMod,
      estado: "validado",
      validadoPor: usuarioAdmin.uid,
      validadoPorNombre: perfilAdmin.nombre || perfilAdmin.correo,
      validadoPorPuesto: perfilAdmin.puesto || null,
      fechaValidacion: firebase.firestore.FieldValue.serverTimestamp(),
      historialValidacion: firebase.firestore.FieldValue.arrayUnion({
        uid: usuarioAdmin.uid,
        nombre: perfilAdmin.nombre || perfilAdmin.correo,
        puesto: perfilAdmin.puesto || null,
        fecha: new Date().toISOString(),
        gravedad
      })
    };
    if (hayNotificacion) {
      cambios.cambioSinVer = true;
      cambios.ultimoCambioAdmin = {
        uid: usuarioAdmin.uid,
        nombre: perfilAdmin.nombre || perfilAdmin.correo,
        fecha: firebase.firestore.FieldValue.serverTimestamp(),
        mensaje: mensajeInspector || null,
        campos: comparacion.campos,
        ubicacionCorregida: comparacion.ubicacionCorregida
      };
    }

    try {
      await colReportes.doc(reporte.id).update(cambios);
      cerrarModal();
    } catch (err) {
      console.error(err);
      mostrarAvisoGlobal("No se pudo guardar la validación. Verifique su conexión e intente de nuevo.", "error");
    }
  });

  // --- Eliminar reporte (con confirmación en dos pasos, sin diálogos nativos) ---
  document.getElementById("btn-eliminar-reporte").addEventListener("click", () => {
    document.getElementById("btn-eliminar-reporte").style.display = "none";
    document.getElementById("confirmar-eliminar").style.display = "block";
  });
  document.getElementById("btn-cancelar-eliminar").addEventListener("click", () => {
    document.getElementById("confirmar-eliminar").style.display = "none";
    document.getElementById("btn-eliminar-reporte").style.display = "inline-flex";
  });
  document.getElementById("btn-confirmar-eliminar").addEventListener("click", async () => {
    const btn = document.getElementById("btn-confirmar-eliminar");
    btn.disabled = true;
    btn.textContent = "Eliminando...";
    try {
      await colReportes.doc(reporte.id).delete();
      mostrarAvisoGlobal("Reporte eliminado correctamente.", "exito");
      cerrarModal();
    } catch (err) {
      console.error(err);
      mostrarAvisoGlobal("No se pudo eliminar el reporte. Verifique su conexión e intente de nuevo.", "error");
      btn.disabled = false;
      btn.textContent = "Sí, eliminar definitivamente";
    }
  });
}

function cerrarModal() {
  document.getElementById("modal-fondo").style.display = "none";
  if (mapaModalGPS) { mapaModalGPS.remove(); mapaModalGPS = null; }
}
document.getElementById("cerrar-modal").addEventListener("click", cerrarModal);
document.getElementById("modal-fondo").addEventListener("click", (e) => { if (e.target.id === "modal-fondo") cerrarModal(); });
</script>
</body>
</html>
