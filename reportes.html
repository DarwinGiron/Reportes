<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#2b2262">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<title>Reportes - COGUSA SGI</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <header class="barra-superior">
    <div class="marca">
      <div class="marca-texto">
        <h1>Reportes</h1>
        <div class="subt" id="nombre-inspector"></div>
      </div>
    </div>
    <nav>
      <a href="reportes.html" class="activo">Reportes</a>
      <a href="inspector.html">Nuevo reporte</a>
      <a href="admin/dashboard.html" data-modulo="dashboard" style="display:none;">Dashboard</a>
      <a href="admin/validacion.html" data-modulo="validacion" style="display:none;">Validación</a>
      <a href="admin/catalogos.html" data-modulo="configuraciones" style="display:none;">Configuraciones</a>
      <a href="admin/informes.html" data-modulo="informes" style="display:none;">Informes</a>
      <div class="campana-contenedor">
        <button class="btn-campana" id="btn-campana" type="button" aria-label="Notificaciones">
          <svg class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="campana-badge" id="campana-badge" style="display:none;">0</span>
        </button>
        <div class="campana-panel" id="campana-panel" style="display:none;"></div>
      </div>
      <button class="btn-salir" onclick="cerrarSesionYSalir()">
        <svg class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Salir
      </button>
    </nav>
  </header>

  <main class="contenedor">
    <div id="lista-reportes" class="rejilla-reportes"></div>
  </main>
</div>

<div class="modal-fondo" id="modal-reporte-inspector" style="display:none;">
  <div class="modal-caja">
    <div class="modal-encabezado">
      <h2 id="titulo-modal-reporte-inspector">Reporte</h2>
      <button class="cerrar-modal" id="cerrar-modal-reporte-inspector" aria-label="Cerrar">
        <svg class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-cuerpo" id="cuerpo-modal-reporte-inspector"></div>
    <div class="modal-pie">
      <button class="btn btn-primario" id="btn-guardar-estado-hallazgo">Guardar estado</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/reportes.js"></script>
<script>
let usuarioActual = null;
let reporteModalActualId = null;
let modalAutoAbiertoDesdeHash = false;

// Se permite cualquier rol (null): tanto inspectores como el admin pueden
// ver la lista de sus propios reportes.
protegerPagina(null, (user, perfil, permisos) => {
  usuarioActual = user;
  document.getElementById("nombre-inspector").textContent = perfil.nombre || perfil.correo;
  aplicarVisibilidadNav(perfil, permisos);
  inicializarCampana(perfil, user.uid);

  suscribirReportesPropios(user.uid, (reportes) => {
    renderizarListaReportes(reportes, abrirModalReporte);

    // Si se llegó con reportes.html#reporte-<id> (ej. enlace directo), abrir
    // directamente el detalle de ese reporte (una sola vez).
    if (!modalAutoAbiertoDesdeHash && location.hash.startsWith("#reporte-")) {
      const id = location.hash.slice("#reporte-".length);
      const reporte = reportes.find((r) => r.id === id);
      if (reporte) {
        modalAutoAbiertoDesdeHash = true;
        abrirModalReporte(reporte);
      }
    }
  }, (err) => {
    console.error("Error cargando reportes:", err);
    document.getElementById("lista-reportes").innerHTML =
      `<p class="aviso aviso-error">No se pudo cargar sus reportes. Verifique su conexión.</p>`;
  });
});

function abrirModalReporte(reporte) {
  reporteModalActualId = reporte.id;
  const estadoActual = reporte.estadoHallazgo || "abierto";
  document.getElementById("titulo-modal-reporte-inspector").textContent = `${reporte.zona} — ${reporte.proceso}`;
  document.getElementById("cuerpo-modal-reporte-inspector").innerHTML = `
    <div class="fotos-grid" style="grid-template-columns:repeat(${(reporte.fotos || []).length || 1},1fr); margin-bottom:14px;">
      ${(reporte.fotos || []).map((f) => `<div class="foto-miniatura"><img src="${f}"></div>`).join("")}
    </div>
    <p><strong>Fecha:</strong> ${formatearFechaHora(reporte.fechaHora)}${reporte.turno ? " · " + reporte.turno : ""}${correccionInline(reporte, "Turno")}</p>
    <p><strong>Zona:</strong> ${reporte.zona}${correccionInline(reporte, "Zona")}</p>
    <p><strong>Proceso:</strong> ${reporte.proceso}${correccionInline(reporte, "Proceso")}</p>
    <p><strong>Descripción:</strong> ${reporte.descripcion}</p>
    <p><strong>Categoría:</strong> ${reporte.categoria || "Sin categoría"}${correccionInline(reporte, "Categoría")}</p>
    <p><strong>Validación del coordinador:</strong> ${reporte.estado === "validado" ? "Ya revisado" : "Pendiente de revisar"}</p>
    ${reporte.gravedad ? `<p><strong>Gravedad:</strong> <span class="etiqueta-gravedad ${claseGravedad(reporte.gravedad)}">${reporte.gravedad}</span></p>` : ""}
    ${reporte.ultimoCambioAdmin?.ubicacionCorregida ? `<p class="aviso aviso-advertencia">El coordinador también corrigió la ubicación (GPS/plano).</p>` : ""}
    ${reporte.ultimoCambioAdmin?.mensaje ? `<p class="aviso aviso-info"><strong>Comentario del coordinador:</strong> ${reporte.ultimoCambioAdmin.mensaje}</p>` : ""}
    <div class="campo">
      <label for="sel-estado-hallazgo">Estado del hallazgo (seguimiento propio)</label>
      <select id="sel-estado-hallazgo">
        <option value="abierto" ${estadoActual === "abierto" ? "selected" : ""}>Abierto</option>
        <option value="en_proceso" ${estadoActual === "en_proceso" ? "selected" : ""}>En proceso</option>
        <option value="corregido" ${estadoActual === "corregido" ? "selected" : ""}>Corregido</option>
      </select>
    </div>
  `;
  document.getElementById("modal-reporte-inspector").style.display = "flex";

  // Si llegó con un aviso pendiente (cambioSinVer), al ver el detalle
  // se da por visto.
  if (reporte.cambioSinVer) {
    colReportes.doc(reporte.id).update({ cambioSinVer: false }).catch(() => {});
  }
}

document.getElementById("cerrar-modal-reporte-inspector").addEventListener("click", () => {
  document.getElementById("modal-reporte-inspector").style.display = "none";
});
document.getElementById("modal-reporte-inspector").addEventListener("click", (e) => {
  if (e.target.id === "modal-reporte-inspector") e.target.style.display = "none";
});
document.getElementById("btn-guardar-estado-hallazgo").addEventListener("click", async () => {
  const valor = document.getElementById("sel-estado-hallazgo").value;
  try {
    await colReportes.doc(reporteModalActualId).update({ estadoHallazgo: valor });
    mostrarAvisoGlobal("Estado del hallazgo actualizado.", "exito");
    document.getElementById("modal-reporte-inspector").style.display = "none";
  } catch (err) {
    console.error(err);
    mostrarAvisoGlobal("No se pudo guardar el estado. Intente de nuevo.", "error");
  }
});
</script>
</body>
</html>
